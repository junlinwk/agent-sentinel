name: Deploy Report to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static report
        run: npm run build:pages

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Commit built report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build report site
          file_pattern: docs
